services:
  anycode:
    build:
      context: .
      args:
        CODEX_NPM_PACKAGE: ${CODEX_NPM_PACKAGE:-@openai/codex}
    environment:
      ANYCODE_ACCESS_KEY: ${ANYCODE_ACCESS_KEY:?set ANYCODE_ACCESS_KEY}
      ANYCODE_HTTP_ADDR: :8080
      ANYCODE_DATA_DIR: /data
      CODEX_BIN: ${CODEX_BIN:-codex}
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:-file:/data/anycode.db}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
    ports:
      - "8080:8080"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    volumes:
      - ./workspaces:/workspaces
      - ./data:/data
      - ${ANYCODE_CODEX_HOME:-${HOME}/.codex}:/home/anycode/.codex
