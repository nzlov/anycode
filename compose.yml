services:
  anycode:
    build:
      context: .
      args:
        PACMAN_MIRROR: ${PACMAN_MIRROR:-}
        NPM_MIRROR: ${NPM_MIRROR:-}
        GOPROXY: ${GOPROXY:-}
    environment:
      ANYCODE_ACCESS_KEY: ${ANYCODE_ACCESS_KEY:?set ANYCODE_ACCESS_KEY}
      ANYCODE_HTTP_ADDR: :${ANYCODE_HTTP_PORT:-8080}
      ANYCODE_DATA_DIR: ${ANYCODE_DATA_DIR:-/home/anycode/.anycode}
      ANYCODE_AGENT_MAX_CONCURRENT: ${ANYCODE_AGENT_MAX_CONCURRENT:-1}
      CLOUDFLARED_BIN: ${CLOUDFLARED_BIN:-cloudflared}
      ANYCODE_ARTIFACT_MAX_FILE_BYTES: ${ANYCODE_ARTIFACT_MAX_FILE_BYTES:-536870912}
      ANYCODE_ARTIFACT_MAX_SESSION_BYTES: ${ANYCODE_ARTIFACT_MAX_SESSION_BYTES:-10737418240}
      ANYCODE_ARTIFACT_PREVIEW_MAX_BYTES: ${ANYCODE_ARTIFACT_PREVIEW_MAX_BYTES:-134217728}
      PLAYWRIGHT_MCP_BIN: ${PLAYWRIGHT_MCP_BIN:-playwright-mcp}
      CHROMIUM_BIN: ${CHROMIUM_BIN:-/usr/bin/chromium}
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:-/home/anycode/.anycode/anycode.turso.db}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
      TURSO_GO_CACHE_DIR: ${TURSO_GO_CACHE_DIR:-/home/anycode/.anycode/turso-cache}
    ports:
      - "${ANYCODE_HTTP_PORT:-8080}:${ANYCODE_HTTP_PORT:-8080}"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    volumes:
      - ${ANYCODE_WORKSPACES_DIR:-./workspaces}:/workspaces
      - ${ANYCODE_HOST_DATA_DIR:-./data}:/home/anycode
