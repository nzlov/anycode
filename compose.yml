services:
  anycode:
    build:
      context: .
      args:
        ANYCODE_BUILD_REGION: ${ANYCODE_BUILD_REGION:-}
    environment:
      ANYCODE_ACCESS_KEY: ${ANYCODE_ACCESS_KEY:?set ANYCODE_ACCESS_KEY}
      ANYCODE_HTTP_ADDR: ${ANYCODE_HTTP_ADDR:-:8080}
      ANYCODE_DATA_DIR: ${ANYCODE_DATA_DIR:-/home/anycode/.anycode}
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:-file:/home/anycode/.anycode/anycode.db}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
    ports:
      - "${ANYCODE_HTTP_PORT:-8080}:8080"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    volumes:
      - ${ANYCODE_WORKSPACES_DIR:-./workspaces}:/workspaces
      - ${ANYCODE_HOST_DATA_DIR:-./data}:/home/anycode
